name: CI/CD workflow
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs: 
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: clonar repositorio
        uses: actions/checkout@v3 
      - name: configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: instalar dependencias
        run: npm install
      - name: ejecutar pruebas
        run: npm test
  desplieuge-production:
    name: Despegar en Vercel
    runs-on: ubuntu-latest
    needs: build-and-test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      VERCEL_ORG_ID: ${{ secrets.projects.orgId }}
      VERCEL_PROJECT_ID: ${{ secrets.projects.id }}
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          node-version: '20'
      
      - name: Instalar dependencias
        run: npm install

      - name: instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Obtener configuracion de Vercel
        run: vercel pull --yes --environment=production --token=${{secrets.VERCEL_TOKEN}}

      - name: Construir el proyecto
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN}}

      - name: Desplegar en produccion
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
